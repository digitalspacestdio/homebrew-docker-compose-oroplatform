# Traefik v3 configuration
global:
  checkNewVersion: false
  sendAnonymousUsage: false

# Entry points
entryPoints:
  web:
    address: ":80"
    # Trust X-Forwarded-* from host Traefik (macOS dual-proxy setup).
    # Host Traefik terminates TLS and forwards HTTP to :8880 with
    # X-Forwarded-Proto: https; without this, Traefik overwrites it to http
    # and Symfony/Oro redirects to HTTPS in an infinite loop.
    forwardedHeaders:
      trustedIPs:
        - "127.0.0.1/32"
        - "172.0.0.0/8"
        - "10.0.0.0/8"
        - "192.168.0.0/16"
    # Optional: HTTP to HTTPS redirect (commented out by default)
    # http:
    #   redirections:
    #     entryPoint:
    #       to: default
    #       scheme: https
  
  default:
    address: ":443"

# API and Dashboard
api:
  dashboard: true
  insecure: false  # Access via Traefik routing, not separate port

# Ping endpoint for health checks
ping:
  entryPoint: web

# Providers
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: "dc_shared_net"
  
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

# Logging
log:
  level: INFO
  format: common

# Access logs (optional)
# accessLog:
#   format: common
