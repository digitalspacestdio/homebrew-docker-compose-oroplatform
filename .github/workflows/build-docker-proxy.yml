name: Build & Publish proxy multi-arch images to GHCR

on:
  push:
    branches: [ master ]
    paths:
      - 'compose/docker/proxy/**'
      - '.github/workflows/build-docker-proxy.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-proxy-amd64:
    name: Build Proxy AMD64
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push AMD64 Image
        uses: docker/build-push-action@v5
        with:
          context: compose/docker/proxy
          file: compose/docker/proxy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/orodc-proxy:amd64
          cache-from: type=gha,scope=proxy-amd64
          cache-to: type=gha,mode=max,scope=proxy-amd64

  build-proxy-arm64:
    name: Build Proxy ARM64
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push ARM64 Image
        uses: docker/build-push-action@v5
        with:
          context: compose/docker/proxy
          file: compose/docker/proxy/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/orodc-proxy:arm64
          cache-from: type=gha,scope=proxy-arm64
          cache-to: type=gha,mode=max,scope=proxy-arm64

  create-proxy-manifest:
    name: Create multi-arch manifest
    needs: [build-proxy-amd64, build-proxy-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/orodc-proxy:latest \
            ghcr.io/${{ github.repository_owner }}/orodc-proxy:amd64 \
            ghcr.io/${{ github.repository_owner }}/orodc-proxy:arm64

          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/orodc-proxy \
            ghcr.io/${{ github.repository_owner }}/orodc-proxy:amd64 \
            ghcr.io/${{ github.repository_owner }}/orodc-proxy:arm64

          echo "Created multi-arch manifest for orodc-proxy"
